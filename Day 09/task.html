<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .container {
            width: 1000px;
            height: 400px;
            border: 2px solid green;
            margin: 10px auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-evenly;
            align-content: space-evenly;
        }

        .box {
            width: 300px;
            height: 150px;
            border: 2px solid red;
        }

        .box2 {
            width: 200px;
            height: 200px;
            border: 2px solid yellow;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box">
            <img width="100%" height="100%" src="https://picsum.photos/200/300?random=1">
        </div>
        <div class="box" style="width: 600px;">
            <img width="100%" height="100%" src="https://picsum.photos/200/300?random=2">
        </div>
        <div class="box2">
            <img width="100%" height="100%" src="https://picsum.photos/200/300?random=3">
        </div>
        <div class="box2">
            <img width="100%" height="100%" src="https://picsum.photos/200/300?random=4">
        </div>
        <div class="box2">
            <img width="100%" height="100%" src="https://picsum.photos/200/300?random=5">
        </div>
    </div>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>

    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .container {
            width: 700px;
            height: 400px;
            border: 2px double green;
            margin: 50px auto;
            display: flex;

            flex-wrap: wrap;
            gap: 20px;
        }

        .item {
            width: 300px;
            height: 100px;
            background-color: yellow;
            border-radius: 20px;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            width: 50px;
            height: 50px;
            background-color: red;
            border-radius: 50%;

        }
    </style>
</head>

<body>
    <div class="container">
        <div class="item">
            <div class="box"></div>
        </div>
        <div class="item">
            <div class="box"></div>
        </div>
        <div class="item">
            <div class="box"></div>
        </div>
        <div class="item">
            <div class="box"></div>
        </div>
        <div class="item">
            <div class="box"></div>
        </div>
        <div class="item">
            <div class="box"></div>
        </div>
    </div>

</body>

</html>

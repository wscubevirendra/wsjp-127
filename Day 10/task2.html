<!DOCTYPE html>
<html lang="en">

<head>

    <title>Document</title>
    <style>
        .parent {
            width: 1000px;
            height: 300px;
            border: 2px solid red;
            display: flex;
        }

        .box {
            width: 200px;
            height: 200px;
            border: 2px solid green;
            flex-shrink: 0;
            flex-grow: 1;
        }
    </style>
</head>

<body>
    <div class="parent">
        <div class="box" style="order: 1;">1</div>
        <div class="box">2</div>
        <div class="box" style="order: -1;">3</div>

    </div>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .container {
            border: 2px solid red;
            margin: 20px auto;
            padding: 20px;
            width: 1000px;
            height: 500px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .box {
            width: 200px;
            height: 150px;
            background-color: #ff07ff;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 100px;
            font-weight: bold;
            color: white;
            transition: 1s;
        }

        .container:hover .box{
            background-color: yellow;
        }


        input[type="password"]{
            border: 2px solid red;
            background-color: yellow;
        }



      
    </style>
</head>

<body>
    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
   

    </div>
</body>

</html>

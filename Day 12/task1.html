<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .container {
            border: 2px solid red;
            margin: 20px auto;
            padding: 20px;
            width: 1000px;
            height: 300px;
            display: flex;
            gap: 20px;

        }

        .card {
            width: 500px;
            height: 200px;
            transition: 1s;
            border-radius: 30px;
            overflow: hidden;
        }

        .card:hover {
            flex-shrink: 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <img src="https://picsum.photos/400/200?random=1" width="100%" height="100%">
        </div>
        <div class="card">
            <img src="https://picsum.photos/400/200?random=2" width="100%" height="100%">
        </div>
        <div class="card">
            <img src="https://picsum.photos/400/200?random=3" width="100%" height="100%">
        </div>
        <div class="card">
            <img src="https://picsum.photos/400/200?random=4" width="100%" height="100%">
        </div>

    </div>
</body>

</html>

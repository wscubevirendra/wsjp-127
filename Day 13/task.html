<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .parent {
            width: 800px;
            height: 200px;
            border: 2px solid red;
            margin: 50px auto;
            position: relative;
        }

        .box {
            width: 100px;
            height: 100px;
            position: absolute;
            transition: 4s;
            top: 0;
        }

        .box:nth-child(1) {
            left: 0;
            background-color: green;
        }

        .box:nth-child(2) {
            left: 700px;
            background-color: yellow;
        }

        .parent:hover .box:nth-child(1) {
            top: 0px;
            left: 700px;
        }

        .parent:hover .box:nth-child(2) {
            top: 0px;
            left: 0px;


        }
    </style>
</head>

<body>
    <div class="parent">
        <div class="box"></div>
        <div class="box"></div>
    </div>

</body>

</html>

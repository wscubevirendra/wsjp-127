<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .card {
            width: 350px;
            height: 400px;
            /* border: 2px solid red; */
            margin: 50px auto;
            position: relative;
            overflow: hidden;
        }

        .card img {
            width: 100%;
            height: 100%;
        }

        .overlay {
            width: 100%;
            height: 100%;
            background-color: rgba(255, 0, 0, 0.6);
            position: absolute;
            top: -100%;
            left: 0;
            transition: 700ms;
        }
        .card:hover .overlay{
            top: 0;
        }
    </style>
</head>

<body>
    <div class="card">
        <img src="https://image.tmdb.org/t/p/w1280/rFhKkXhk7ClU03jQ5rHIApJDwev.jpg" alt="">
        <div class="overlay"></div>

    </div>

</body>

</html>

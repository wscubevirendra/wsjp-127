<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .card {
            width: 350px;
            height: 400px;
            /* border: 2px solid red; */
            margin: 50px auto;
            position: relative;
            overflow: hidden;
        }

        .card img {
            width: 100%;
            height: 100%;
        }

        

        .overlay1 {
            width: 50%;
            height: 100%;
            position: absolute;
            top: 0;
            background-color: rgba(225, 0, 0, 0.7);
            left: -100%;
            transition: 1s;
        }

        .overlay2 {
            width: 50%;
            height: 100%;
            position: absolute;
            top: 0;
            background-color: rgba(0, 0, 255, 0.7);
            right: -100%;
            transition: 1s;
            transition-delay: 1s;

        }

        .card:hover .overlay1{
            left: 0;

        }

         .card:hover .overlay2{
            right: 0;

        }
    </style>
</head>

<body>
    <div class="card">
        <img src="https://image.tmdb.org/t/p/w1280/rFhKkXhk7ClU03jQ5rHIApJDwev.jpg" alt="">
        <div class="overlay1"></div>
        <div class="overlay2"></div>
    </div>

</body>

</html>

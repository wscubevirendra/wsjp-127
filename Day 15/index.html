        header {
            width: 100%;
            height: 82px;
            box-shadow: 0 4px 12px 0 rgba(0, 0, 0, .05);
            background-color: white;
            position: sticky;
            top: 0;
            left: 0;
            z-index: 12343243243;

        }

        .header-container {
            width: 1200px;
            height: 100%;
            /* border: 2px solid red; */
            margin: auto;
            position: relative;

        }

        .banner {
            width: 1200px;
            margin: auto;
        }

        .top-banner {
            width: 1200px;
            height: 300px;
            display: flex;
            margin: auto;
        }

        .slider {
            width: 1200px;
            height: 305px;
            /* border: 2px solid red; */
            margin: 40px auto;
            display: flex;
            justify-content: space-between;

        }

        .box {
            width: 232px;
            height: 305px;

            top: 0;
        }

        .box img {
            width: 100%;
            height: 100%;
        }

        .middle-container {
            width: 100%;
            border: 2px solid red;
            margin: auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;

        }

        .card {
            width: 15%;
        }

        .menu-container {
            width: 100%;
            position: absolute;
            height: 300px;
            /* border: 2px solid red; */
            background-color: gray;
            box-shadow: 2px p2x 2px gray;
            top: 80px;
            opacity: 0;
            visibility: hidden;
            transition: 400ms;
        }

        .item:hover .menu-container{
            opacity: 1;
            visibility: visible;
        }

    </style>

<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .container {
            width: 800px;
            height: 500px;
            border: 2px double red;
            margin: 20px auto;
        }

        .card {
            width: 200px;
            height: 200px;
            background-color: green;
            transition: 1s;
        }

        .container:hover .card {
            transform: translate(600px, 300px);

        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">

        </div>
    </div>

</body>

</html>

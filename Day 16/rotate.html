<!DOCTYPE html>
<html lang="en">

<head>

    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .card {
            width: 200px;
            height: 200px;
            border: 2px solid red;
            margin: 90px auto;
            font-size: 80px;
            transition: 300ms;
            transform-origin: bottom left;
        }

        .card:hover {
            transform: rotate(360deg);
        }
    </style>
</head>

<body>
    <div class="card">
        Hello

    </div>

</body>

</html>

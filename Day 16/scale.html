<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .box {
            width: 300px;
            height: 300px;
            box-shadow: 2px 3px 4px 5px gray;
            margin: 50px auto;
            overflow: hidden;
            transform: skew(200deg);

        }

        .box img {
            width: 100%;
            height: 100%;
            transition: 500ms;
            transform-origin: right ;

        }

        .box:hover img {
            transform: scale(3, 3);
        }

    </style>
</head>

<body>
    <div class="box">
        <img src="https://assets.myntassets.com/f_webp,w_350,c_limit,fl_progressive,dpr_2.0/assets/images/banners/2018/2/2/11517563925069-kitchen.jpg"
            alt="">

    </div>

</body>

</html>

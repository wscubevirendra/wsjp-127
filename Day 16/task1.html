<!DOCTYPE html>
<html lang="en">

<head>

    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .card {
            width: 300px;
            height: 300px;

            margin: 50px auto;
            border: 1px solid red;
            transition: 400ms;
        }

        .card:hover {
            transform: translate(-5px, -5px);
            box-shadow: 2px 3px 6px 4px red;

        }
    </style>
</head>

<body>
    <div class="card">

    </div>
</body>

</html>

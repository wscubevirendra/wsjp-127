<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .container {
            width: 800px;
            height: 400px;
            border: 2px double green;
            margin: 70px auto;

        }

        .box {
            width: 100px;
            height: 100px;
            box-shadow: 2px 2px 3px gray;
            background-color: yellow;
            animation-name: demo;
            animation-duration: 2s;
            animation-iteration-count: infinite;
            /* animation-delay: 3s; */
        }

        @keyframes demo {
            0% {
                transform: translate(0, 0) scale(0) rotate(80deg);
                background-color: red;
            }

            50% {
                transform: translate(700px, 0px) scale(1);
                background-color: green;

            }

            60% {
                transform: translate(700px, 300px) scale(1);
            }

            75% {
                transform: translate(0px, 300px) scale(1);
            }

            100% {
                transform: translate(0, 0) scale(0) rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box">Box</div>

    </div>


</body>

</html>

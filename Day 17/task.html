<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Animations Demo</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    h2 {
      margin-top: 40px;
    }

    /* 5. Bounce */
    .bounce {
      display: inline-block;
      animation: bounce 0.6s infinite alternate;
      background: orange;
      padding: 10px;
    }

    @keyframes bounce {
      from { transform: translateY(0); }
      to { transform: translateY(-30px); }
    }

    /* 6. Gradient Background */
    .bg {
      height: 150px;
      background: linear-gradient(270deg, red, blue, green);
      background-size: 600% 600%;
      animation: gradientMove 5s ease infinite;
      margin-bottom: 10px;
    }

    @keyframes gradientMove {
      0% { background-position: 0% }
      50% { background-position: 100% }
      100% { background-position: 0% }
    }

    /* 7. Typing Effect */
    .typing {
      width: 0;
      overflow: hidden;
      white-space: nowrap;
      border-right: 2px solid black;
      animation: typing 3s steps(20) forwards;
    }

    @keyframes typing {
      to { width: 200px; }
    }

  </style>
</head>
<body>

  <h1>CSS Animation Examples</h1>


  <h2>5. Bounce</h2>
  <div class="bounce">Bounce</div>

  <h2>6. Gradient Background</h2>
  <div class="bg"></div>

  <h2>7. Typing Effect</h2>
  <div class="typing">Hello Developer</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        button {
            display: inline-block;
            width: 100px;
            height: 30px;
            background: linear-gradient(70deg, red, green, yellow);
            color: white;
            border-radius: 10px;
            margin: 100px;
            border: none;
            animation: bounce 600ms infinite linear alternate;

        }

        @keyframes bounce {
            to {
                transform: translateY(-20px) scale(1.1);
            }
        }
    </style>
</head>

<body>
    <button>Click</button>
</body>

</html>

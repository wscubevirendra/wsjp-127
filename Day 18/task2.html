<!DOCTYPE html>
<html lang="en">

<head>

    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background-color: #833AB4;
        }

        .main {
            width: 100%;
            height: 100%;
            /* border: 2px solid red; */
            position: relative;
            overflow: hidden;
        }

        .card {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            box-shadow: inset 0 0 25px rgba(26, 190, 232, 0.4), inset -5px -10px 35px rgba(255, 255, 255, 0.777);
            position: absolute;
            bottom: -50%;
            animation: demo 3s infinite linear alternate;
        }

        .card:nth-child(1) {
            width: 100px;
            height: 100px;
            left: 5%;
            animation-duration: 5s;
        }

        .card:nth-child(2) {
            width: 150px;
            height: 150px;
            left: 25%;
            animation-duration: 3s;

        }

        .card:nth-child(3) {
            width: 50px;
            height: 50px;
            left: 50%;
            animation-duration: 6s;

        }

        .card:nth-child(4) {
            width: 120px;
            height: 120px;
            left: 70%;
            animation-duration: 7s;

        }

        .card:nth-child(5) {
            width: 85px;
            height: 85px;
            left: 90%;
            animation-duration: 2s;

        }

        @keyframes demo {
            0% {
                transform: translate(0px, 0px) scale(1);
            }

            70% {
                transform: translate(0, -400px) scale(0.9);

            }

            100% {
                transform: translate(0, -800px) scale(0.5);
                background: linear-gradient(60deg, red, green);


            }
        }
    </style>
</head>

<body>
    <div class="main">
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>

    </div>

</body>

</html>

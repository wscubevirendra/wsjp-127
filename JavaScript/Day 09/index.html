    function calc(x, y, sign) {
        let result = null
        if (sign == "+") {
            result = x + y
        } else if (sign == "-") {
            result = x - y
        } else if (sign == "/") {
            result = x / y
        } else if (sign == "%") {
            result = x % y
        } else if (sign == "*") {
            result = x * y
        } else {
            result = "invalid Oprator"
        }

        return result
    }

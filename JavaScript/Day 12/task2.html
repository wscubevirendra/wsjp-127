<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>
    <style>
        .container {
            display: flex;
            gap: 20px;
        }

        .card {
            width: 150px;
            height: 200px;
            background-color: lightblue;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            cursor: pointer;

        }

        .new-style {
            background-color: lightcoral;
            color: white;
            font-size: 25px;
            border-radius: 10px;
            transition: all 0.3s ease;
        }
    </style>
</head>

<body>
    <div class="container">
        <div onclick="addStyle(this)" class="card">Card 1</div>
        <div onclick="addStyle(this)" class="card">Card 2</div>
        <div onclick="addStyle(this)" class="card">Card 3</div>
        <div onclick="addStyle(this)" class="card">Card 4</div>
        <div onclick="addStyle(this)" class="card">Card 4</div>
        <div onclick="addStyle(this)" class="card">Card 4</div>
        <div onclick="addStyle(this)" class="card">Card 4</div>
    </div>

    <script>
        const boxes = document.querySelectorAll('.card');

        function addStyle(card) {

            for (const box of boxes) {
                box.style = ""
            }

            card.setAttribute('style', "background-color: lightcoral; color: white; font-size: 25px; border-radius: 10px; transition: all 0.3s ease;");

        }

    </script>

</body>

</html>

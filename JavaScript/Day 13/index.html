<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .container {
            width: 1200px;
            margin: 50px auto;
            /* border: 2px solid red; */
            display: flex;
            flex-wrap: wrap;
            justify-content: space-evenly;
            gap: 20px;
        }

        .card {
            width: 300px;
            height: 200px;
            box-shadow: 0px 2px 3px gray;
            border-radius: 20px;
            overflow: hidden;
        }

        .card img {
            width: 100%;
            height: 100%;
        }

        .overlay {
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            display: none;
        }

        .done {
            display: block;
        }
    </style>
</head>

<body>

    <div class="container"></div>
    <div class="overlay">
        <img width="400" height="300" src="https://picsum.photos/200/300?random=1" alt="">
    </div>

    <script>
        const overlay = document.querySelector(".overlay")
        const img = document.querySelector(".overlay img")


        function display() {
            for (let i = 1; i <= 18; i++) {
                //Create Element
                const box = document.createElement("div");
                //Add Class   
                box.classList.add("card")
                //Set InnerHtml or InnrText
                box.innerHTML = `<img src="https://picsum.photos/200/300?random=${i}">`
                document.querySelector(".container").append(box)


                box.addEventListener("click", function (event) {
                    console.log()
                    overlay.classList.add("done")
                    img.src = event.target.src;

                })

                img.addEventListener("click", function () {
                    overlay.classList.remove("done")

                })
            }

        }

        display()

    </script>

</body>

</html>
